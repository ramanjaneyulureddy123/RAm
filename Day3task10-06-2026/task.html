// factorial (recursive)
function fact(n){
    if(n === 0){
        return 1
    }
    return n * fact(n-1)
}

console.log(fact(5 ))

// iterative 

function factorial(n){
    let result=1
    for (let i=1; i<=n;i++){
        result *=i
    }
    return result
}
console.log(factorial(5))

function sum(n){
    if (n === 0){
    return 0
    }
    return n + sum(n-1)
}

console.log(sum(5))

function sums(n){
    let total =0
    for (let i=1; i<=n; i++ ){
        total += i
    }
    return total
}

console.log(sums(10))
