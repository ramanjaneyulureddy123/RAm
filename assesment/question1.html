function reverse(word){

    let reversed=""
    for (let i=word.length-1; i>=0; i--){
        reversed +=word[i]
    }
     return reversed;
     
}

function largenumber(arr){
    let max=arr[0]

    for(let i=1; i<arr.length; i++){
        if (arr[i]>max){
            max=arr[i]
        }
    }
    return max;
}

console.log(largenumber([10,80,20,30]))
