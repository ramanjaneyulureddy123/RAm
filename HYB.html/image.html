<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin:0;
            background-color: antiquewhite;
        }
        .container{
            background-color: aqua;
            /* object-fit: cover; */
            width: 200px;
            border-radius:10%;
            text-align: center;
            padding: 20px;
            /* box-shadow:5px 5px 10px rgba(250,0,0,0.2);   */
            box-shadow:0px 0px 10px grey;
    }
    .container img{
        object-fit: cover;
        width: 100px;
        height: 100px;
        border-radius: 50px;
        transition:transform 0.4s ease;
    }
    .container button{
        background-color: yellow;
        border-radius: 10px;
    }
    .container button:hover{
        background-color: red;
    }
    .container img:hover {
    transform: scale(1.2);
}
    </style>
</head>
<body>
    <div class="container">
        <img src="../10-03-2026/image.html.webp">
        <p>this is my image</p>
        <button>subscribe</button>
    </div>
</body>
</html>
