<style>
    .gallery{
            display:grid;
            gap:20px;
            padding:20px;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr))
        }
        .gallery img {
            width: 100%;
            height: 200px;
            border-radius:10px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
    .gallery img:hover{
        transform: scale(1.1)
    }
</style>
