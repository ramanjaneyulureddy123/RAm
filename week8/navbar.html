<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
     <style>
         *{
    
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
}

.navbar {
    background: #333;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
}

.logo {
    font-size: 22px;
    font-weight: bold;
}
.nav-links {
    list-style: none;
    display: flex;
    align-items: center;
}
.nav-links li {
    margin-left: 20px;
}
.nav-links a {
    color: white;
    text-decoration: none;
}
button {
    padding: 8px 15px;
    border: none;
    background:red;
    color: white;
    cursor: pointer;
}

.menu-icon {
    display: none;
    font-size: 28px;
    cursor: pointer;
}

/* Mobile View */
@media (max-width: 768px) {
    .menu-icon {
        display: block;
    }

    .nav-links {
        display: none;
        flex-direction: column;
        background: #333;
        top: 60px;
        width: 100%;
        text-align: center;
    }

    .nav-links li {
        margin: 15px ;
    }

}

     </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">LOGO</div>

    <div class="menu-icon" onclick="toggleMenu()">
        3 bars
    </div>

    <ul class="nav-links" >
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
        <li><button>Login</button></li>
    </ul>
</nav>

<script>
function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("show");
}
</script>

</body>
</html>
