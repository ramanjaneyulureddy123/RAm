<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin:0;
        }
        .container{
            background-color: aqua;
            width: 200px;
            border-radius:10%;
            text-align: center;
            padding: 20px;
            box-shadow:0px 0px 10px grey;
    }
    .container img{
        object-fit: cover;
        width: 100px;
        height: 100px;
        border-radius: 50px;
        transition:transform 0.4s ease;
    }
    .container button{
        background-color: yellow;
        border-radius: 10px;
    }
    .container button:hover{
        background-color: red;
    }

    </style>
</head>
<body>
    <div class="container">
        <img src="./image.html.webp">
        <p>image</p>
        <p>this is nature image</p>
        <button>Follow Button</button>
    </div>
</body>
</html>
