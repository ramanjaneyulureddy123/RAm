function debounce(fn,delay){
    let timer;

    return function(...args){
        clearTimeout(timer)
        timer=setTimeout(()=>{
            fn(...args)
        },delay)
    }
}

let handleCount=0;
function handle(e){
    handleCount++;
    console.log("debounced execution",
        handleCount, e.target.value
    )
}
const d=debounce(handle,2000)
document.getElementById("search").addEventListener("input",d)


function throttle(fn, delay) {

      let lastCall = 0;

      return function (...args) {

        let now = Date.now();

        if (now - lastCall >= delay) {

          fn(...args);

          lastCall = now;
        }
      };
    }
    
    // Throttle Test
    let scrollCount = 0;

    function handleScroll() {

      scrollCount++;

      console.log(
        "Throttle Executed:",
        scrollCount
      );
    }

    const throttledScroll =
      throttle(handleScroll, 1000);

    window.addEventListener(
      "scroll",
      throttledScroll
    );

    </script>
