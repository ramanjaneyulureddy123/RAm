<!DOCTYPE html>
<html>
<head>
  <title>Grid Template Areas</title>
  <style>
    body{
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .container{
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-areas: 
        "header header"
        "sidebar content"
        "footer footer";
        grid-gap:5px;
        
    }
    .header {
        grid-area:header;
        background-color: brown;
         display: flex;
        align-items: center;
        justify-content: center;
    }
    .sidebar {
        grid-area:sidebar;
        background-color: pink;
    }
    .content {
        grid-area:content;
        background-color: antiquewhite;
    }
    .footer {
        grid-area:footer;
        background-color:blue;
    }
  </style>
</head>
<body>

<div class="container" style="background-color: aliceblue; width: 300px; height:200px;">
  <div class="header">Header</div>
  <div class="sidebar">Sidebar</div>
  <div class="content">Content</div>
  <div class="footer">Footer</div>
</div>

</body>
</html>
