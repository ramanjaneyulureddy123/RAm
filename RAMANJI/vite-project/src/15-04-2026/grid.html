<!DOCTYPE html>
<html>
<head>
  <style>
    .container {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 10px;
    }

    .box {
      background: lightblue;
      padding: 20px;
      text-align: center;
    }

    .box1 {
      grid-column: 1/4;
    }
    .box2{
      grid-column:1/4;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="box box1">1</div>
  <div class="box box2">2</div>
  <div class="box">3</div>
  <div class="box">4</div>
</div>

</body>
</html>
