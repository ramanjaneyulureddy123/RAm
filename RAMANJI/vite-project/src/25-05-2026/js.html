function fac(num){
    let fact=1;
    for(let i=1; i<=num; i++){
        fact=fact*i
    }
    return fact
}
console.log(fac(4))

function countvowel(str){
    let count=0
    let vowels="aeiou"
    for(let i=0; i<str.length; i++){
        if(vowels.includes(str[i])){
            count++
        }
    }
    return count
}

countvowel("anji")

function large(arr){
    let max=arr[0]
    for(let i=1; i<arr.length; i++){
        if(arr[i]>max){
            max=arr[i]
        }
    }
    return max
}

console.log(large([2,3,4,5,8]))

function change(){

let count=0
function increment(){

function decrement(){

function reset(){
