<input type="text" id="search"/>
<body>
    <script>
        function debounce(){
            let timer
            return function(){
                clearTimeout(timer)
                timer= setTimeout(()=>{
                    console.log("debounce")
                },2000)
            }
        }

        // debounce()()
        let myfunction=debounce()
        myfunction()
                myfunction()
        myfunction()

        function d(fn,delay){
            let timer;
            return function(...args){
                clearTimeout(timer)
                timer=setTimeout(()=>{
                    fn.apply(this,args)
                },delay)
            }
        }

        function a(e){
            console.log(e.target.value)
        }
const b= d(a,500)

document.getElementById("search").addEventListener("input",b)

function scroll(){
    console.log("scroll stpped")

} 
const dscroll=d(scroll,500)
window.addEventListener("scroll",dscroll)
    </script>
</body>
