<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form</title>

  <style>

    body{
      font-family: Arial;
      background-color: lightblue;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    form{
      background-color: white;
      padding: 30px;
      width: 300px;
      border-radius: 10px;
    }

    h2{
      text-align: center;
      margin-bottom: 20px;
    }

    input{
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: 1px solid gray;
    }

    button{
      width: 100%;
      padding: 10px;
      background-color: blue;
      color: white;
      border: none;
      border-radius:5px;
      cursor: pointer;
    }

    button:hover{
      background-color: darkblue;
    }

  </style>
</head>

<body>

  <form onSubmit="handleClick(event)">

    <h2>Login Form</h2>

    <label>Email</label><span style="color: red;">*</span>
    <input 
      type="email"
      id="email"
      placeholder="Enter Email"
      required
    >

    <label>Password</label>
    <input 
      type="password"
      id="password"
      placeholder="Enter Password"
      minlength="8"
      required
    >

    <button type="submit">Login</button>

  </form>
  <script>
    const handleClick=(e)=>{
        e.preventDefault()
        alert("login successful")
        document.getElementById("email").value=""
                document.getElementById("password").value=""

    }
  </script>

</body>
</html>
