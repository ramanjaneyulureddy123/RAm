function change(){
    document.body.classList.toggle("dark")
    if(document.body.classList.contains("dark")){

}

let numbers=[10,90,30,50,100]
for(let i=0; i<numbers.length; i++){
    for(let j=i+1; j<numbers.length; j++){
        if (numbers[i]>numbers[j]){
            let temp=numbers[i];
            numbers[i]=numbers[j];
            numbers[j]=temp;
        }
    }
}
