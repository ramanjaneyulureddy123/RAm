<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .whole{
            display: flex;
            justify-content:center;
            align-items: center;
            text-align:center;
            height: 100vh;
        }
        .content{
            background-color: pink;
            width: 300px;
            padding:20px;
            border-radius: 20px;
        }
        .content h1{
      font-size: 50px;
    }
    .content button {
        padding:15px 20px;
        font-size:20px;
        border-radius:15px;
        border:none;
        cursor:pointer;
        background-color: green;
    }
    .content button:hover{
        background-color: greenyellow;
    }

    @media (max-width:600px){
        .content h1{
            font-size:20px;
        }
        .content button {
            width:100%;
        }
    }
    </style>
</head>
<body>
    <div class="whole">
       
<div class="content">
    <h1>welcome to developers</h1>
    <p>this is our website and your website </p>
    <button>subscribe</button>
</div>
    </div>
</body>
</html>
