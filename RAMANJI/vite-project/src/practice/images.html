<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }
h1{
    text-align: center;
}
.gallery{
    display:grid;
    gap: 15px;
    padding:20px;
     grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
}
.gallery img {
    width: 100%;
    height: 200px;
    border-radius: 10px;
    object-fit: cover;
    transition: transform 0.3s ease;
}
.gallery img:hover{
    transform:scale(1.1);
}

</style>
</head>

<body>

<h1>My Image Gallery</h1>

<div class="gallery">
  <img src="https://picsum.photos/300?1">
  <img src="https://picsum.photos/300?2">
  <img src="https://picsum.photos/300?3">
  <img src="https://picsum.photos/300?4">
  <img src="https://picsum.photos/300?5">
  <img src="https://picsum.photos/300?6">
  <img src="https://picsum.photos/300?7">
  <img src="https://picsum.photos/300?8">
  <img src="https://picsum.photos/300?9">
  <img src="https://picsum.photos/300?10">
  <img src="https://picsum.photos/300?11">
  <img src="https://picsum.photos/300?12">
</div>

</body>
</html>
