<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color:grey;
            padding: 20px;

        }
        .whole{
            display:flex;
            justify-content: center;
            gap: 20px;
        }
        .card{
            background-color:white;
            width:250px;
            padding:20px;
            border-radius:10px;
           box-shadow: 0 4px 10px pink;
           transition:0.3s;
            text-align:center;  
        }
        .card:hover{
            /* transform:scale(1.1); */
             transform: translateY(-10px);
 box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .card.standard{
            border: 2px solid yellow;
            transform:translateY(-10px);
        }
        button{
                padding:10px 20px;
                background-color: red;
                border:none;
                cursor:pointer;
        }

        @media (max-width:768px){
            .whole{
                flex-direction:column;
                align-items:center;
            }
        }
      
    </style>
</head>
<body>
    <div class="whole">
        <div class="card">
  <h2>first plan</h2>
  <p>two month plan </p>
  <button>subscribe</button>
        </div>

        <div class="card standard">
  <h2>second plan</h2>
  <p>two month plan </p>
  <button>subscribe</button>
        </div>
        <div class="card">
  <h2>third plan</h2>
  <p>two month plan </p>
  <button>subscribe</button>
        </div>
    </div>
</body>
</html>
