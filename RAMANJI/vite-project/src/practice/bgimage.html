<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Section</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    .hero{
      width: 100%;
      height: 100vh;
      background-image: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb");
      background-size: cover;
      background-position: center;
      position: relative;

      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .overlay{
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      top: 0;
      left: 0;
    }

    .content{
      position: relative;
      color: white;
      z-index: 1;
      padding: 20px;
    }

    .content h1{
      font-size: 50px;
      margin-bottom: 20px;
    }

    .content button{
      padding: 12px 25px;
      border: none;
      background-color: blue;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 18px;
    }

    .content button:hover{
      background-color: darkblue;
    }

    @media(max-width:600px){

      .content h1{
        font-size: 30px;
      }

      .content button{
        width: 100%;
      }

    }

  </style>
</head>

<body>

  <section class="hero">

    <div class="overlay"></div>

    <div class="content">
      <h1>Welcome To My Website</h1>
      <button>Get Started</button>
    </div>

  </section>

</body>
</html>
