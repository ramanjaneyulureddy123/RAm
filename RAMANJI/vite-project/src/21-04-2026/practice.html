    <script>
        function sumofarray(arr){
            let sum=0;
            for(i=0; i<arr.length; i++){
                sum+=arr[i]
            }
            return sum;
        }
        console.log(sumofarray([1,2,3,4]))

       
        let num=5
        for(let i=1; i<=10; i++){
            console.log(num + "x" + i + "=" +(num*i))
        }

        function largest(arr){
            let max=arr[0];
            for (let i=0; i<arr.length;i++){
                if(arr[i]>max){
                    max=arr[i]
                }
            }
            return max 
        }
        console.log(largest([100,30,56,9]))
