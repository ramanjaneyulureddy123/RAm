function hello(string){
    let reverse=""
    for (let i=string.length-1; i>=0;i--){
    reverse +=string[i]
}
return reverse 
}

function findlargest(arr){
    let max=arr[0]
    for (let i=1; i<arr.length; i++){
        if(arr[i]>max){
            max=arr[i]
        }
    }
    return max;

}
