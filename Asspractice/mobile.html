<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Buttons</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
    }

    /* Container for buttons */
    .button-container {
      display: flex;          /* default: horizontal */
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    /* Style for buttons */
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #4CAF50;
      color: white;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color:pink;
    }

    /* Mobile view: stack buttons vertically */
    @media screen and (max-width: 600px) {
      .button-container {
        flex-direction: column; /* vertical stack */
        align-items: center;
      }

      button {
        width: 80%; /* optional: make buttons wider on mobile */
      }
    }
  </style>
</head>
<body>
  <h1>Responsive Buttons</h1>

  <div class="button-container">
    <button>Button 1</button>
    <button>Button 2</button>
    <button>Button 3</button>
  </div>
</body>
</html>
