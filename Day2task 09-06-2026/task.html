function factorial(n) {
    if (n === 1) return 1;   // base condition

    return n * factorial(n - 1);
}

console.log(factorial(5));

// fibonacci 

function fib(n){
    if (n<=1) return n;
    return fib(n-1)+fib(n-2)
}
