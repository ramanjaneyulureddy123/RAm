<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        nav{
            display:flex;
            justify-content:space-between;
            background-color:blue;
            align-items:center;
            padding:20px;
            color:white;

        }
        ul{
            display:flex;
            gap:20px;
            list-style:none;
        }

        @media (max-width:600px){
            nav{
                flex-direction:column;
                gap:15px;
            }
            ul{
                flex-direction:column;
                align-items:center;
            }
        }

        .one{
            display:flex;
            justify-content:space-around;
            align-items:center;
            background-color:red;
        }
.container{
    display:grid;
    grid-template-columns:200px 1fr;
    height:100vh;
}
header{
    grid-column:1/3
}
footer{
    grid-column:1/3;
}
    </style>
</head>
<body>
    <div>
        <nav>
            <h2>header logo</h2>
            <ul>
                <li>home</li>
                <li>About</li>
                <li>Services</li>
                <li>Contact</li>
            </ul>
        </nav>
    </div>

    <nav class="one">
  <div>Logo</div>
  <div>Home About Contact</div>
</nav>

<div class="container">
  <header>Header</header>
  <aside>Sidebar</aside>
  <main>Main Content</main>
  <footer>Footer</footer>
</div>
</body>
</html>
