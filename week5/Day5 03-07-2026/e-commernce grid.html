<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            background-color:  #f2f2f2;
        }

        .container{
            display:grid;
            grid-template-columns: repeat(4, 1fr);
            gap:20px;
            padding:20px;
        }

        .card{
            background: white;
            border-radius: 10px;
            padding:15px;
            text-align:center;
            /* transition:0.3s; */
        }

         .card:hover {
    transform: scale(1.03);
  }

        .card img{
            width:100%;
            height:150px;
            object-fit: cover;
            border-radius:15px;
        }

        .price{
            color:green;
            font-weight:bold;
        }

        /* laptop  */
         @media (max-width:768px){
            .container{
                grid-template-columns:repeat(2, 1fr);
            }
        }
/* mobile  */
        @media (max-width:480px){
            .container{
                grid-template-columns:1fr;
            }
            h3{
                font-size:10px;
            }
        }

       
    </style>
</head>
<body>
    <div class="container">

        <div class="card">
<img src="https://via.placeholder.com/300x150" />
<h3>Head Phones</h3>
<p class="price">100</p>
        </div>

        <div class="card">
<img src="https://via.placeholder.com/300x150" />
<h3>Laptop</h3>
<p class="price">7000</p>
        </div>

        <div class="card">
<img src="https://via.placeholder.com/300x150" />
<h3>cap</h3>
<p class="price">150</p>
        </div>

        <div class="card">
<img src="https://via.placeholder.com/300x150" />
<h3>Mobile</h3>
<p class="price">1000</p>
        </div>
    </div>
</body>
</html>
