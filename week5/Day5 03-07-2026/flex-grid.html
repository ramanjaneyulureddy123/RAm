<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color:black;
            color:white;
            padding:15px 20px;
        }

        .search{
            display: flex;
            /* width:100%; */
            
        }
         .search input {
    flex: 1;
    padding: 8px;
    border: none;
  }
  .search button {
    padding: 8px 12px;
    background: #febd69;
    border: none;
    cursor: pointer;
  }

  .categories{
    display:flex;
    padding: 10px;
    gap:10px;
    background-color: grey;
    color:white;
  }

  .container{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
gap:20px;
padding:20px;
}
.card{
    background-color: pink;
    padding:15px;
    border-radius:5px;

}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.card-footer{
    display: flex;
     justify-content: space-between;
    align-items: center;
}
 .price {
    color: green;
    font-weight: bold;
  }

  button {
    background: #ffd814;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
  }

  @media (max-width:900px){
    .container{
        grid-template-columns: repeat(2, 1fr);
    }
    .search{
        width:70%;
    }
  }
  @media (max-width:600px){
    .container{
        grid-template-columns:1fr;
    }
    .header{
        flex-direction:column;
        gap:10px;
    }
    .categories{
        flex-wrap:wrap;
    }
  }
    </style>
</head>
<body>
    <div class="header">

        <h2>amazon</h2>

        <div class="search">
            <input type="text" placeholder="search products">
            <button>search</button>
        </div>
