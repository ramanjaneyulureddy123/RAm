<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .btn {
  position: relative;
  padding: 10px 20px;
  background: blue;
  color: white;
  /* border: none; */
}

.btn:hover {
  top: -3px;
  left: 3px;
}

.modal {
  position: relative;
  width: 300px;
  padding: 20px;
  background: lightgray;
}

.close {
  position: absolute;
  top: 5px;
  right: 5px;
}

.navbar {
  position: sticky;
  top: 0;
  background: blue;
  color: white;
  padding: 15px;
}

.content {
  height: 1500px;
}

.chat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 15px;
  background: green;
  color: white;
  border: none;
}

.one{
  position: static;
  width: 200px;
  height: 100px;
  background: lightblue;
  margin: 10px;
}
.left-img {
  float: right;
  width: 150px;
  margin-right: 15px;
}

.left {
  float: left;
  width: 30%;
  height: 50px;
  background: lightblue;
}

.right {
  float: right;
  width: 70%;
  height: 50px;
  background: lightgreen;
}

.footer {
  clear: both;
  background: gray;
  color: white;
  padding: 15px;
}

.container{
    display: flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content: center;
}
.two{
    flex: 1;
    min-width:200px;
    padding:20px;
    background-color: red;
    text-align:center;
    border: 2px solid black;
}
    </style>
</head>
<body>
    
    <div class="left">Sidebar</div>
<div class="right">Content</div>

<div class="footer">
  Footer
</div>

    <img src="../Day1 29-06-2026/image.html.webp" class="left-img" alt="Image">

<p>
  This text wraps around the image because the image is floated to the left.
</p>

    <div class="one">Box 1</div>
<div class="one">Box 2</div>

    <button class="btn">Click Me  relative</button>

    <div class="modal">
  <button class="close">X</button>
  <p>Popup Content</p>
</div>

<header class="navbar">
  Navigation Bar
</header>

<div class="content">
  <p>Scroll down...</p>
  <p>More content...</p>
  <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Velit, ex.</p>
</div>

<button class="chat"> Chat</button>

<div class="container">
    <div class="two">Box 1</div>
    <div class="two">Box 2</div>
    <div class="two">Box 3</div>
</div>
</body>
</html>
