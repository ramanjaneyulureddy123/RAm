<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{
            background-color: red;
            padding:20px;
            margin:20px;

        }
        .box2{
            background-color: green;
            padding:10px 30px;
            margin:20px 40px;
        }

         .solid  { border: 3px solid black; }
    .dashed {border:3px dashed blue}
    .dotted {border:3px dotted red}
    .double {border: 5px double green}
    .groove {border: 6px groove purple}
    .ridge  {border:6px ridge orange}
    .box7 {
  border: 6px inset brown;
  padding: 20px;
}

.box8 {
  border: 6px outset red;
  padding: 20px;
}

.none{
    border: none;
    background-color: yellow;
}

/* .content{

  width: 200px;

  box-sizing: content-box;

} */
 .box {
  display: block;
  background: lightblue;
}

.boxx {
  display: inline;
  background: yellow;
}

.boxo {
  display: inline-block;
  width: 100px;
  height: 50px;
  background: lightgreen;
}
.hidden {
  display: none;
}
    </style>
</head>
<body>
    <div class="box1">BOX</div>
        <div class="box1">BOX</div>

<div class="box2">
    Box2
</div>

<div class="solid">Solid Border</div>
<div class="dashed">Dashed Border</div>
<div class="dotted">Dotted Border</div>
<div class="double">Double Border</div>
<div class="groove">Groove Border</div>
<div class="ridge">Ridge Border</div>
<div class="box7">Inset Border</div>
<div class="box8">Outset Border</div>
<div class="none"> no border</div>

<div class="box">Block Element</div>

<span class="boxx">Inline 1</span>
<span class="boxx">Inline 2</span>

<div class="boxo">Inline Block</div>
<div class="boxo">Inline Block</div>

<div class="hidden">Hidden Box</div>


</body>
