// convert promise based code to async/await 
function data(){
    return  Promise.resolve("data received")
}
async function get(){
    try{
        const getData=await data()
        console.log(getData)
    }catch(error){
console.log(error)
    }
    
}

get()

function task(){
    return new Promise((resolve)=>{
        setTimeout(()=>{
            resolve("async wait code ")
        },2000)
    })
}

async function getData(){
    try{
        const result=await task()
        console.log(result)
    }catch(error){
        console.log(error)
    }
}
getData()

// generator 
function* numberss(){
    yield 1;
    yield 2;
    yield 3
}
let gen=numberss()

console.log(gen.next())
console.log(gen.next())
console.log(gen.next())
console.log(gen.next())

function* infinite() {
    let i = 1;

    while (true) {
        yield i++;
    }
}
let gene = infinite();
console.log(gene.next().value)
console.log(gene.next().value)
console.log(gene.next().value)
console.log(gene.next().value)


function* count(){
    for (let i=1; i<=5; i++){
        yield i;
    }
}
let genn=count()
for (let value of genn){
    console.log(value)
}
