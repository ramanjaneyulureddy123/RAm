 .container{
    display: grid;
    grid-template-columns: 5fr 5fr;
    grid-template-areas: 
    "header header"
    "aside main"
    "footer footer";
    grid-gap:10px;
        text-align: center;
}
.a,.d{
    padding: 20px;
    /* height: 50px; */
}
.b,.c{
    padding: 60px;
}
div{
    text-align: center;
    color: red;
    font-weight: bold;
}
.a{
    grid-area: header;
    background:red;
    color: aqua;
}
.b{
    grid-area: aside;
    background-color: orange;
}
.c{
    grid-area:main;
    background-color: green;
width: 70%;

}
.d{
    grid-area:footer;
    background-color: blue;
}
</style>
<body>
    <h1 class="box">hello</h1>
    <p>the responsive design</p>
<div>The responsive design</div>
    <div class="container">
  <div class="a">header</div>
  <div class="b">aside</div>
  <div class="c">main</div>
  <div class="d">Footer</div>
</div>
